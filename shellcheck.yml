name: shellcheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        # severity=warning: the script trips three info-level notes on purpose
        # (intentional `A && B || C` guards, and single-quoted `$$`/`$PIDF`
        # that must expand in the inner shell, not the outer one).
        run: shellcheck --severity=warning --shell=bash gamemode-nightlight install.sh
